events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript
                  application/wasm application/octet-stream;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Blazor WASM — route all non-file requests to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # PWA control files MUST NOT be cached (by the browser OR a reverse proxy). Otherwise the
        # version-check reads a stale service-worker-assets.js after a redeploy and never reports the
        # new version, and service-worker updates lag. Listed first so it wins over the rules below.
        location ~* (service-worker(-assets)?\.js|blazor\.boot\.json|\.webmanifest)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        # Cache static assets aggressively
        location ~* \.(wasm|dll|dat|blat|pdb)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
        location ~* \.(js|css|png|svg|ico|json)$ {
            add_header Cache-Control "public, max-age=86400";
        }
    }
}
