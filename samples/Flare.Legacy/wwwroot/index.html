<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flare Legacy - демо корпоративного приложения</title>
    <base href="/" />
    <!-- PWA: install manifest + theme color; the service worker is registered at the end of body. -->
    <link href="manifest.webmanifest" rel="manifest" />
    <meta name="theme-color" content="#2f6cb0" />
    <!-- Material Symbols (icon glyphs used by FlareIcon Name="...") -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <!-- Flare component styles -->
    <link rel="stylesheet" href="_content/Flare.Components/css/flare-components.css" />
    <!-- App shell -->
    <link rel="stylesheet" href="css/app.css" />
    <link href="Flare.Legacy.styles.css" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <!-- Anti-FOUC: sets theme classes + a theme-aware splash before first paint. -->
    <script src="_content/Flare.Components/js/flare-bootstrap.js"></script>
</head>
<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>
    <div id="blazor-error-ui">
        Произошла непредвиденная ошибка.
        <a href="." class="reload">Перезагрузить</a>
        <span class="dismiss">x</span>
    </div>
    <script src="_content/Flare.Components/js/flare-components.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
