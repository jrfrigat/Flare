<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flare Legacy - демо корпоративного приложения</title>
    <base href="/" />
    <!-- PWA: install manifest + theme color; the service worker is registered at the end of body. -->
    <link href="manifest.webmanifest" rel="manifest" />
    <meta name="theme-color" content="#2f6cb0" />
    <!-- Icons render as inline SVG (FlareIcons / MaterialDesign3Icons) - no icon font needed. -->
    <!-- Flare component styles -->
    <link rel="stylesheet" href="_content/Flare.Components/css/flare-components.css" />
    <!-- App shell -->
    <link rel="stylesheet" href="css/app.css" />
    <link href="Flare.Legacy.styles.css" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <!-- Flare boot: applies saved theme classes to <html> before first paint and fires
         "flare:ready" when ready. It draws no splash - the app owns its own (below). -->
    <script src="_content/Flare.Components/js/flare-bootstrap.js"></script>
    <!-- App-owned loading splash (background + spinner), faded out by Flare on ready. -->
    <style>
        html { background: #f4f6f9; }
        html.flare-mode-dark { background: #10151b; color-scheme: dark; }
        #flare-splash {
            position: fixed; inset: 0; z-index: 99999;
            display: flex; align-items: center; justify-content: center;
            background: #f4f6f9;
        }
        html.flare-mode-dark #flare-splash { background: #10151b; }
        #flare-splash .legacy-splash__spinner {
            width: 44px; height: 44px; border-radius: 50%;
            border: 4px solid rgba(128, 128, 128, .25); border-top-color: #2f6cb0;
            animation: legacy-splash-spin 1s linear infinite;
        }
        @keyframes legacy-splash-spin { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) { #flare-splash .legacy-splash__spinner { animation-duration: 2.4s; } }
    </style>
</head>
<body>
    <div id="flare-splash"><div class="legacy-splash__spinner"></div></div>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>
    <div id="blazor-error-ui">
        Произошла непредвиденная ошибка.
        <a href="." class="reload">Перезагрузить</a>
        <span class="dismiss">x</span>
    </div>
    <script src="_content/Flare.Components/js/flare-components.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
