<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flare - Blazor Component Library</title>
    <base href="/" />

    <!--
      Icon-font FOUT guard. FlareIcon renders Material Symbols ligatures (`<span class="flare-icon">home</span>`),
      so until the icon font downloads the raw ligature NAMES ("home", "search", ...) would paint as text on a
      cold (uncached) load. Hide icons until the font is ready (or a short safety timeout), so they fade in as
      glyphs instead of flashing their names. visibility:hidden reserves layout, so there is no shift.
    -->
    <style>html:not(.flare-icons-ready) .flare-icon{visibility:hidden}</style>
    <script>
      (function () {
        var reveal = function () { document.documentElement.classList.add('flare-icons-ready'); };
        try {
          if (document.fonts && document.fonts.load) {
            document.fonts.load('24px "Material Symbols Rounded"').then(reveal, reveal);
            document.fonts.ready.then(reveal);
          } else { reveal(); }
        } catch (e) { reveal(); }
        setTimeout(reveal, 3000); // safety: never keep icons hidden if the font fails to load
      })();
    </script>

    <!-- PWA -->
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <meta name="theme-color" content="#6750a4" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- Flare component styles -->
    <link rel="stylesheet" href="_content/Flare.Components/css/flare-components.css" />
    <link rel="stylesheet" href="_content/Flare.Components.Media/css/flare-media.css" />
    <link rel="stylesheet" href="_content/Flare.Components.Carousel/css/carousel.css" />
    <link rel="stylesheet" href="_content/Flare.Components.Kanban/css/kanban.css" />
    <link rel="stylesheet" href="_content/Flare.Components.QrCode/css/qrcode.css" />
    <link rel="stylesheet" href="_content/Flare.Components.RichTextEditor/css/richtexteditor.css" />
    <link rel="stylesheet" href="_content/Flare.Components.Transfer/css/transfer.css" />
    <link rel="stylesheet" href="_content/Flare.Components.IDE/css/flare-ide.css" />

    <!-- Gallery shell -->
    <link rel="stylesheet" href="css/app.css" />
    <link href="Flare.Gallery.styles.css" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- Anti-FOUC: sets theme classes + a theme-aware splash before first paint. One line. -->
    <script src="_content/Flare.Components/js/flare-bootstrap.js"></script>
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#10005;</span>
    </div>

    <script src="_content/Flare.Components/js/flare-components.js"></script>
    <!--
        Start Blazor with an explicit applicationCulture so the matching satellite resource assembly
        (e.g. ru/Flare.Gallery.resources.wasm) is part of the initial boot download and present before
        first paint - otherwise the runtime picks satellites by navigator.language, and a user whose
        browser is English but who chose Russian would flash untranslated text on a cold load.
        Priority mirrors LanguageService: saved choice (localStorage 'blazorCulture') -> browser
        language -> English. Only en/ru are shipped.
    -->
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js" autostart="false"></script>
    <script>
        (function () {
            var stored = null;
            try { stored = localStorage.getItem('blazorCulture'); } catch (e) { }
            var lang = (stored || navigator.language || 'en').toLowerCase();
            var culture = lang.indexOf('ru') === 0 ? 'ru' : 'en';
            Blazor.start({ applicationCulture: culture });
        })();
    </script>
</body>

</html>
