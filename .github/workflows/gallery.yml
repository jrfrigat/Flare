name: Gallery (Docker)

# Builds the Flare.Gallery WASM PWA Docker image and publishes it to GitHub Container Registry.
# Versioned independently from the NuGet packages:
#   - push a  gallery-v*  tag (e.g. gallery-v1.4.0) to release an image
#   - or run manually (workflow_dispatch) with an optional version
#   - pull requests touching the Gallery only BUILD the image (no push) to validate the Dockerfile
on:
  push:
    tags: [ 'gallery-v*' ]
  pull_request:
    paths:
      - 'samples/Flare.Gallery/**'
      - 'src/**'
      - 'Directory.Build.props'
      - 'nginx.conf'
      - '.github/workflows/gallery.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. 1.4.0). Defaults to the commit SHA.'
        required: false

concurrency:
  group: gallery-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # push to ghcr.io

jobs:
  docker:
    name: Build & publish image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve image tags & whether to push
        id: meta
        run: |
          image="ghcr.io/${{ github.repository_owner }}/flare-gallery"
          image=$(echo "$image" | tr '[:upper:]' '[:lower:]')   # GHCR requires lowercase
          if [[ "${GITHUB_REF}" == refs/tags/gallery-v* ]]; then
            version="${GITHUB_REF_NAME#gallery-v}"; push=true
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
            if [[ -z "$version" ]]; then version="${GITHUB_SHA::7}"; fi
            push=true
          else
            version="pr-${GITHUB_SHA::7}"; push=false
          fi
          {
            echo "image=$image"
            echo "version=$version"
            echo "push=$push"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.meta.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: samples/Flare.Gallery/Dockerfile
          push: ${{ steps.meta.outputs.push == 'true' }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          # Read layer cache always (free, speeds builds), but only WRITE it on real
          # releases. PR validation builds with mode=max used to balloon the GHA cache
          # (10 GB/repo cap) with throwaway per-PR layer blobs, so PRs no longer push cache.
          cache-from: type=gha
          cache-to: ${{ steps.meta.outputs.push == 'true' && 'type=gha,mode=max' || '' }}
