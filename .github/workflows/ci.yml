name: CI

# Build + test + packaging validation on every push/PR. Publishing lives in separate workflows:
#   release.yml  - pushes NuGet packages on  v*         tags
#   gallery.yml  - builds/pushes the Docker image on gallery-v* tags
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build, test & validate packaging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # MinVer needs full history/tags to compute the version

      # The libraries multi-target net8.0/net9.0/net10.0, so all three SDKs (and their targeting
      # packs/runtimes) are needed to build and run-test every TFM. The latest SDK (10) drives the build.
      - name: Setup .NET (8 / 9 / 10)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Flare.slnx

      - name: Build (Release)
        run: dotnet build Flare.slnx -c Release --no-restore

      # One run over the solution exercises every test project on every TFM it targets:
      # Flare.Components.Tests multi-targets, so this covers the net8.0/net9.0/net10.0 library builds;
      # Flare.Core.Tests is net10-only (it references the net10 CssAudit tool).
      - name: Test (all TFMs)
        run: dotnet test Flare.slnx -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/*.trx'
          if-no-files-found: ignore

      # Pack here too so a packaging break (missing README/icon, CS1591, etc.) fails CI, not release.
      # IsPackable=false on Gallery/Legacy/tests/tools means only the publishable packages are produced.
      - name: Pack (validation only)
        run: dotnet pack Flare.slnx -c Release --no-build -o artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
